services:
  backend:
    build: ./backend
    container_name: effective_backend
    expose:
      - "8080"
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080"]
      interval: 10s
      retries: 3

  nginx:
    image: nginx:1.27-alpine
    container_name: effective_nginx
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
